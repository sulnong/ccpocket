name: Upload Store Metadata

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to upload'
        required: true
        type: choice
        options:
          - both
          - ios
          - android
      upload_screenshots:
        description: 'Upload screenshots'
        required: false
        type: boolean
        default: true
      upload_metadata:
        description: 'Upload metadata (title, description, etc.)'
        required: false
        type: boolean
        default: true
      upload_images:
        description: 'Upload images (icon, feature graphic, etc.)'
        required: false
        type: boolean
        default: false
      android_version_code:
        description: 'Android versionCode to update (defaults to latest android tag build number)'
        required: false
        type: string
        default: ''

jobs:
  ios:
    if: ${{ inputs.platform == 'ios' || inputs.platform == 'both' }}
    runs-on: macos-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Ruby
        uses: ruby/setup-ruby@c4e5b1316158f92e3d49443a9d58b31d25ac0f8f # v1.306.0
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: apps/mobile

      - name: Install fastlane
        run: gem install fastlane

      - name: Upload iOS metadata
        env:
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_IDENTIFIER: ${{ secrets.APP_STORE_CONNECT_KEY_IDENTIFIER }}
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
          SKIP_SCREENSHOTS: ${{ inputs.upload_screenshots == false }}
          SPACESHIP_SCREENSHOT_UPLOAD_TIMEOUT: "5"
        run: fastlane ios metadata

  android:
    if: ${{ inputs.platform == 'android' || inputs.platform == 'both' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Ruby
        uses: ruby/setup-ruby@c4e5b1316158f92e3d49443a9d58b31d25ac0f8f # v1.306.0
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: apps/mobile

      - name: Install fastlane
        run: gem install fastlane

      - name: Read Android version code
        id: android_version
        run: |
          version=$(git tag -l 'android/v*' --sort=-v:refname | head -1 | sed 's|^android/v||')
          if [ -z "$version" ]; then
            version=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          fi
          echo "code=${version##*+}" >> "$GITHUB_OUTPUT"

      - name: Validate metadata
        run: |
          error=0
          for lang in en-US ja-JP zh-CN ko-KR; do
            file="fastlane/metadata/android/${lang}/short_description.txt"
            if [ -f "$file" ]; then
              len=$(wc -m < "$file" | tr -d ' ')
              if [ "$len" -gt 80 ]; then
                echo "::error::${file} is ${len} chars (max 80)"
                error=1
              fi
            fi
            file="fastlane/metadata/android/${lang}/full_description.txt"
            if [ -f "$file" ]; then
              len=$(wc -m < "$file" | tr -d ' ')
              if [ "$len" -gt 4000 ]; then
                echo "::error::${file} is ${len} chars (max 4000)"
                error=1
              fi
            fi
          done
          exit $error

      - name: Upload Android metadata
        env:
          GCLOUD_SERVICE_ACCOUNT_CREDENTIALS: ${{ secrets.GCLOUD_SERVICE_ACCOUNT_CREDENTIALS }}
          SKIP_UPLOAD_METADATA: ${{ inputs.upload_metadata == false }}
          SKIP_UPLOAD_SCREENSHOTS: ${{ inputs.upload_screenshots == false }}
          SKIP_UPLOAD_IMAGES: ${{ inputs.upload_images == false }}
          ANDROID_VERSION_CODE: ${{ inputs.android_version_code || steps.android_version.outputs.code }}
        run: fastlane android metadata
