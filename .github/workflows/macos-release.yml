name: macOS Release
on:
  push:
    tags:
      - 'macos/v*'
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  release:
    runs-on: macos-15
    outputs:
      version: ${{ steps.version.outputs.version }}
      semver: ${{ steps.version.outputs.semver }}
      build_number: ${{ steps.version.outputs.build_number }}
      dmg_name: ${{ steps.rename.outputs.dmg_name }}
      dmg_url: ${{ steps.release_urls.outputs.dmg_url }}
      release_url: ${{ steps.release_urls.outputs.release_url }}
    env:
      APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      APP_STORE_CONNECT_KEY_IDENTIFIER: ${{ secrets.APP_STORE_CONNECT_KEY_IDENTIFIER }}
      APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
      MACOS_CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
      MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Read Flutter version from .mise.toml
        id: mise
        run: echo "flutter_version=$(grep 'flutter' .mise.toml | sed 's/.*= *\"//' | sed 's/\"//')" >> "$GITHUB_OUTPUT"

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          flutter-version: ${{ steps.mise.outputs.flutter_version }}
          cache: true

      - run: flutter pub get
        working-directory: apps/mobile

      - run: dart analyze .
        working-directory: apps/mobile

      - run: flutter test
        working-directory: apps/mobile

      - name: Install Codemagic CLI Tools
        run: |
          pipx install codemagic-cli-tools
          pipx ensurepath

      - name: Fetch Developer ID signing files
        run: |
          set -o pipefail
          P12_PATH="$RUNNER_TEMP/certificate.p12"
          CERT_KEY_PATH="$RUNNER_TEMP/certificate-key.pem"
          echo "$MACOS_CERTIFICATE_P12" | base64 --decode > "$P12_PATH"
          openssl pkcs12 \
            -in "$P12_PATH" \
            -nocerts \
            -nodes \
            -passin "pass:$MACOS_CERTIFICATE_PASSWORD" \
            | openssl rsa -out "$CERT_KEY_PATH"

          if ! app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type MAC_APP_DIRECT \
            --platform MAC_OS \
            --create \
            --certificate-key "@file:$CERT_KEY_PATH"; then
            echo "::error::Failed to fetch Developer ID signing files. Check that MACOS_CERTIFICATE_P12 matches an existing Developer ID Application certificate in App Store Connect, or rotate the secret before re-running."
            exit 1
          fi
        env:
          BUNDLE_ID: com.k9i.ccpocket

      - name: Setup keychain
        run: keychain initialize

      - name: Add certs to keychain
        run: keychain add-certificates

      # --- Build ---
      - name: Set up code signing
        run: xcode-project use-profiles

      - name: Build macOS app
        working-directory: apps/mobile
        run: flutter build macos --release

      - name: Re-sign and verify signed app bundle
        id: app
        run: |
          APP_PATH="apps/mobile/build/macos/Build/Products/Release/CC Pocket.app"
          echo "app_path=$APP_PATH" >> "$GITHUB_OUTPUT"

          IDENTITY=$(security find-identity -v -p codesigning | grep "Developer ID Application" | head -1 | awk -F'"' '{print $2}')
          if [ -z "$IDENTITY" ]; then
            echo "::error::Developer ID Application identity not found in keychain"
            exit 1
          fi

          PROFILE_PATH="$APP_PATH/Contents/embedded.provisionprofile"
          if [ ! -f "$PROFILE_PATH" ]; then
            echo "::error::missing embedded.provisionprofile in signed macOS app bundle before re-signing"
            exit 1
          fi

          # Preserve the entitlements Xcode generated from the provisioning
          # profile, then remove get-task-allow before Developer ID re-signing.
          # Replacing them with the raw Release.entitlements file can break
          # keychain access in the distributed artifact.
          EXTRACTED_ENTITLEMENTS_PATH="$RUNNER_TEMP/extracted-app-entitlements.plist"
          RESIGNED_ENTITLEMENTS_PATH="$RUNNER_TEMP/resigned-app-entitlements.plist"
          codesign -d --entitlements :- "$APP_PATH" > "$EXTRACTED_ENTITLEMENTS_PATH"
          if [ ! -s "$EXTRACTED_ENTITLEMENTS_PATH" ]; then
            echo "::error::Failed to extract entitlements from Xcode-signed app"
            exit 1
          fi
          /usr/libexec/PlistBuddy -c "Delete :com.apple.security.get-task-allow" "$EXTRACTED_ENTITLEMENTS_PATH" || true

          # CocoaPods embeds Sparkle with prebuilt helper binaries. Re-sign
          # them with our Developer ID identity so notarization accepts the
          # nested updater tools and sees secure timestamps on every binary.
          SPARKLE_FRAMEWORK_PATH="$APP_PATH/Contents/Frameworks/Sparkle.framework"
          if [ -d "$SPARKLE_FRAMEWORK_PATH" ]; then
            SPARKLE_VERSION_DIR="$SPARKLE_FRAMEWORK_PATH/Versions/B"

            for SPARKLE_HELPER in \
              "$SPARKLE_VERSION_DIR/Autoupdate" \
              "$SPARKLE_VERSION_DIR/XPCServices/Downloader.xpc" \
              "$SPARKLE_VERSION_DIR/XPCServices/Installer.xpc" \
              "$SPARKLE_VERSION_DIR/Updater.app"; do
              if [ -e "$SPARKLE_HELPER" ]; then
                codesign --force --timestamp --options runtime \
                  --sign "$IDENTITY" \
                  "$SPARKLE_HELPER"
              fi
            done

            codesign --force --timestamp --options runtime \
              --sign "$IDENTITY" \
              "$SPARKLE_FRAMEWORK_PATH"
          fi

          # Re-sign the final app bundle for notarization requirements while
          # keeping the provisioning-derived keychain entitlements intact.
          codesign --force --timestamp --options runtime \
            --sign "$IDENTITY" \
            --entitlements "$EXTRACTED_ENTITLEMENTS_PATH" \
            "$APP_PATH"

          codesign --verify --deep --strict "$APP_PATH"

          # Confirm the provisioning profile survived re-signing.
          if [ ! -f "$PROFILE_PATH" ]; then
            echo "::error::missing embedded.provisionprofile in signed macOS app bundle"
            exit 1
          fi

          codesign -d --entitlements :- "$APP_PATH" > "$RESIGNED_ENTITLEMENTS_PATH"
          if grep -q "com.apple.security.get-task-allow" "$RESIGNED_ENTITLEMENTS_PATH"; then
            echo "::error::get-task-allow entitlement is still present after re-signing"
            cat "$RESIGNED_ENTITLEMENTS_PATH"
            exit 1
          fi

          echo "Entitlements after re-sign:"
          plutil -p "$RESIGNED_ENTITLEMENTS_PATH"

          echo "✅ Code signing verified"
          echo "✅ embedded.provisionprofile present"

      # --- Create DMG ---
      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG
        id: dmg
        run: |
          APP_PATH="${{ steps.app.outputs.app_path }}"
          DMG_NAME="CC-Pocket-macos.dmg"

          # Create DMG with Applications symlink and styled window
          create-dmg \
            --volname "CC Pocket" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "CC Pocket.app" 150 185 \
            --app-drop-link 450 185 \
            --no-internet-enable \
            "$DMG_NAME" \
            "$APP_PATH"

          echo "dmg_path=$DMG_NAME" >> "$GITHUB_OUTPUT"

          # Sign the DMG too
          IDENTITY=$(security find-identity -v -p codesigning | grep "Developer ID Application" | head -1 | awk -F'"' '{print $2}')
          if [ -n "$IDENTITY" ]; then
            codesign --force --sign "$IDENTITY" "$DMG_NAME"
          fi

      # --- Notarize ---
      - name: Setup App Store Connect API key for notarization
        run: |
          KEY_PATH="$HOME/.private_keys/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8"
          mkdir -p "$(dirname "$KEY_PATH")"
          echo "$APP_STORE_CONNECT_PRIVATE_KEY" > "$KEY_PATH"

      - name: Notarize DMG
        run: |
          KEY_PATH="$HOME/.private_keys/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8"
          RESULT_PATH="$RUNNER_TEMP/notarytool-result.json"
          LOG_PATH="$RUNNER_TEMP/notarytool-log.json"

          xcrun notarytool submit "${{ steps.dmg.outputs.dmg_path }}" \
            --key "$KEY_PATH" \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --issuer "$APP_STORE_CONNECT_ISSUER_ID" \
            --wait --timeout 30m \
            --output-format json > "$RESULT_PATH"

          SUBMISSION_ID=$(ruby -rjson -e 'data = JSON.parse(File.read(ARGV[0])); puts data.fetch("id")' "$RESULT_PATH")
          STATUS=$(ruby -rjson -e 'data = JSON.parse(File.read(ARGV[0])); puts data.fetch("status")' "$RESULT_PATH")

          echo "Notary submission id: $SUBMISSION_ID"
          echo "Notary status: $STATUS"

          if [ "$STATUS" != "Accepted" ]; then
            xcrun notarytool log "$SUBMISSION_ID" \
              --key "$KEY_PATH" \
              --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
              --issuer "$APP_STORE_CONNECT_ISSUER_ID" \
              --output-format json | tee "$LOG_PATH"
            echo "::error::Notarization failed with status $STATUS"
            exit 1
          fi

          # Staple the notarization ticket
          xcrun stapler staple "${{ steps.dmg.outputs.dmg_path }}"
          echo "✅ Notarization complete"

      # --- GitHub Release ---
      - name: Extract version from tag
        if: startsWith(github.ref, 'refs/tags/')
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#macos/v}"
          if [[ "$VERSION" != *+* ]]; then
            echo "::error::macOS release tags must include a build number, e.g. macos/v1.69.0+120"
            exit 1
          fi
          {
            echo "version=$VERSION"
            echo "semver=${VERSION%%+*}"
            echo "build_number=${VERSION#*+}"
          } >> "$GITHUB_OUTPUT"

      - name: Extract changelog section
        if: startsWith(github.ref, 'refs/tags/')
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SEMVER="${VERSION%%+*}"
          NOTES=$(awk "/^## \\[${SEMVER}\\]/{found=1; next} /^## \\[/{if(found) exit} found{print}" CHANGELOG.md)
          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Rename DMG with version
        if: startsWith(github.ref, 'refs/tags/')
        id: rename
        run: |
          SEMVER="${{ steps.version.outputs.semver }}"
          VERSIONED_DMG="CC-Pocket-macos-v${SEMVER}.dmg"
          mv "${{ steps.dmg.outputs.dmg_path }}" "$VERSIONED_DMG"
          echo "dmg_path=$VERSIONED_DMG" >> "$GITHUB_OUTPUT"
          echo "dmg_name=$VERSIONED_DMG" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_NOTES: ${{ steps.changelog.outputs.notes }}
        run: |
          printf '%s\n' "$RELEASE_NOTES" > /tmp/release_notes.md
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release edit "$GITHUB_REF_NAME" \
              --title "macOS ${{ steps.version.outputs.version }}" \
              --notes-file /tmp/release_notes.md
            gh release upload "$GITHUB_REF_NAME" \
              "${{ steps.rename.outputs.dmg_path }}" \
              --clobber
          else
            gh release create "$GITHUB_REF_NAME" \
              "${{ steps.rename.outputs.dmg_path }}" \
              --title "macOS ${{ steps.version.outputs.version }}" \
              --notes-file /tmp/release_notes.md
          fi

      - name: Prepare release URLs
        if: startsWith(github.ref, 'refs/tags/')
        id: release_urls
        run: |
          TAG_URL="${GITHUB_REF_NAME//+/%2B}"
          {
            echo "release_url=https://github.com/${GITHUB_REPOSITORY}/releases/tag/${TAG_URL}"
            echo "dmg_url=https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG_URL}/${{ steps.rename.outputs.dmg_name }}"
          } >> "$GITHUB_OUTPUT"

  deploy-sparkle-appcast:
    if: startsWith(github.ref, 'refs/tags/macos/v')
    needs: release
    runs-on: macos-15
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: https://k9i-0.github.io/ccpocket/sparkle/appcast.xml
    env:
      GH_TOKEN: ${{ github.token }}
      SPARKLE_VERSION: 2.9.1
      SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main

      - name: Download macOS release asset
        id: asset
        run: |
          ASSET_DIR="$RUNNER_TEMP/sparkle-release"
          mkdir -p "$ASSET_DIR"
          gh release download "$GITHUB_REF_NAME" \
            --pattern "${{ needs.release.outputs.dmg_name }}" \
            --dir "$ASSET_DIR"
          DMG_PATH="$ASSET_DIR/${{ needs.release.outputs.dmg_name }}"
          if [[ ! -f "$DMG_PATH" ]]; then
            echo "::error::Downloaded DMG not found at $DMG_PATH"
            exit 1
          fi
          echo "dmg_path=$DMG_PATH" >> "$GITHUB_OUTPUT"

      - name: Download Sparkle tools
        id: sparkle
        run: |
          TOOLS_DIR="$RUNNER_TEMP/sparkle-tools"
          mkdir -p "$TOOLS_DIR"
          gh release download "$SPARKLE_VERSION" \
            --repo sparkle-project/Sparkle \
            --pattern "Sparkle-${SPARKLE_VERSION}.tar.xz" \
            --dir "$TOOLS_DIR"
          tar -xf "$TOOLS_DIR/Sparkle-${SPARKLE_VERSION}.tar.xz" -C "$TOOLS_DIR"
          SIGN_UPDATE_PATH="$(find "$TOOLS_DIR" -type f -name sign_update | head -n 1)"
          if [[ -z "$SIGN_UPDATE_PATH" ]]; then
            echo "::error::sign_update not found in downloaded Sparkle tools"
            find "$TOOLS_DIR" -maxdepth 4 -type f
            exit 1
          fi
          echo "sign_update_path=$SIGN_UPDATE_PATH" >> "$GITHUB_OUTPUT"

      - name: Generate Sparkle appcast
        run: |
          if [[ -z "$SPARKLE_PRIVATE_KEY" ]]; then
            echo "::error::SPARKLE_PRIVATE_KEY secret is not configured"
            exit 1
          fi

          mkdir -p docs/sparkle

          SIGNATURE_FRAGMENT="$(printf '%s' "$SPARKLE_PRIVATE_KEY" | \
            "${{ steps.sparkle.outputs.sign_update_path }}" \
              --ed-key-file - \
              "${{ steps.asset.outputs.dmg_path }}")"

          PUB_DATE="$(LC_ALL=C date -Ru)"
          printf '%s\n' \
            '<?xml version="1.0" encoding="utf-8"?>' \
            '<rss version="2.0"' \
            '     xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle"' \
            '     xmlns:dc="http://purl.org/dc/elements/1.1/">' \
            '  <channel>' \
            '    <title>CC Pocket macOS Updates</title>' \
            '    <link>https://k9i-0.github.io/ccpocket/sparkle/appcast.xml</link>' \
            '    <description>Updates for CC Pocket macOS</description>' \
            '    <language>en</language>' \
            '    <item>' \
            '      <title>Version ${{ needs.release.outputs.semver }}</title>' \
            "      <pubDate>$PUB_DATE</pubDate>" \
            '      <sparkle:version>${{ needs.release.outputs.build_number }}</sparkle:version>' \
            '      <sparkle:shortVersionString>${{ needs.release.outputs.semver }}</sparkle:shortVersionString>' \
            '      <sparkle:releaseNotesLink>${{ needs.release.outputs.release_url }}</sparkle:releaseNotesLink>' \
            '      <enclosure' \
            '        url="${{ needs.release.outputs.dmg_url }}"' \
            '        sparkle:version="${{ needs.release.outputs.build_number }}"' \
            '        sparkle:shortVersionString="${{ needs.release.outputs.semver }}"' \
            "        $SIGNATURE_FRAGMENT" \
            '        type="application/octet-stream" />' \
            '    </item>' \
            '  </channel>' \
            '</rss>' \
            > docs/sparkle/appcast.xml

          cat docs/sparkle/appcast.xml

      - name: Validate generated Sparkle appcast
        env:
          EXPECTED_BUILD_NUMBER: ${{ needs.release.outputs.build_number }}
          EXPECTED_SEMVER: ${{ needs.release.outputs.semver }}
        run: |
          python3 - docs/sparkle/appcast.xml <<'PY'
          import os
          import sys
          import xml.etree.ElementTree as ET

          path = sys.argv[1]
          expected_build = os.environ["EXPECTED_BUILD_NUMBER"]
          expected_semver = os.environ["EXPECTED_SEMVER"]
          sparkle = "{http://www.andymatuschak.org/xml-namespaces/sparkle}"

          root = ET.parse(path).getroot()
          channel = root.find("channel")
          item = channel.find("item") if channel is not None else None
          enclosure = item.find("enclosure") if item is not None else None
          version = item.find(f"{sparkle}version") if item is not None else None
          short_version = (
              item.find(f"{sparkle}shortVersionString")
              if item is not None
              else None
          )

          actual_build = (version.text or "").strip() if version is not None else ""
          actual_semver = (
              (short_version.text or "").strip()
              if short_version is not None
              else ""
          )

          errors = []
          if actual_build != expected_build:
              errors.append(
                  f"sparkle:version={actual_build!r}, expected {expected_build!r}"
              )
          if actual_semver != expected_semver:
              errors.append(
                  "sparkle:shortVersionString="
                  f"{actual_semver!r}, expected {expected_semver!r}"
              )
          if enclosure is None or not enclosure.attrib.get(f"{sparkle}edSignature"):
              errors.append("missing enclosure/@sparkle:edSignature")

          if errors:
              raise SystemExit("Invalid generated Sparkle appcast: " + "; ".join(errors))

          print(f"Generated Sparkle appcast is {actual_semver}+{actual_build}")
          PY

      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

      - name: Verify published Sparkle appcast
        env:
          EXPECTED_BUILD_NUMBER: ${{ needs.release.outputs.build_number }}
          EXPECTED_SEMVER: ${{ needs.release.outputs.semver }}
          SPARKLE_APPCAST_URL: https://k9i-0.github.io/ccpocket/sparkle/appcast.xml
        run: |
          set -euo pipefail

          for attempt in {1..12}; do
            TMP_APPCAST="$(mktemp)"
            curl --fail --location --show-error --silent \
              --retry 3 --retry-delay 2 \
              "$SPARKLE_APPCAST_URL" \
              --output "$TMP_APPCAST"

            if python3 - "$TMP_APPCAST" <<'PY'
          import os
          import sys
          import xml.etree.ElementTree as ET

          path = sys.argv[1]
          expected_build = os.environ["EXPECTED_BUILD_NUMBER"]
          expected_semver = os.environ["EXPECTED_SEMVER"]
          sparkle = "{http://www.andymatuschak.org/xml-namespaces/sparkle}"

          root = ET.parse(path).getroot()
          channel = root.find("channel")
          item = channel.find("item") if channel is not None else None
          version = item.find(f"{sparkle}version") if item is not None else None
          short_version = (
              item.find(f"{sparkle}shortVersionString")
              if item is not None
              else None
          )

          actual_build = (version.text or "").strip() if version is not None else ""
          actual_semver = (
              (short_version.text or "").strip()
              if short_version is not None
              else ""
          )

          if actual_build != expected_build or actual_semver != expected_semver:
              raise SystemExit(
                  "Published Sparkle appcast mismatch: "
                  f"{actual_semver}+{actual_build}, expected "
                  f"{expected_semver}+{expected_build}"
              )

          print(f"Published Sparkle appcast is {actual_semver}+{actual_build}")
          PY
            then
              exit 0
            fi

            echo "Published Sparkle appcast is not updated yet; retrying ($attempt/12)."
            sleep 5
          done

          echo "::error::Published Sparkle appcast did not update to ${EXPECTED_SEMVER}+${EXPECTED_BUILD_NUMBER}"
          exit 1
