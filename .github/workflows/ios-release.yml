name: iOS Release (Shorebird)
on:
  push:
    tags:
      - 'ios/v*'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-26
    env:
      SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_TOKEN }}
      APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      APP_STORE_CONNECT_KEY_IDENTIFIER: ${{ secrets.APP_STORE_CONNECT_KEY_IDENTIFIER }}
      APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
      CERTIFICATE_PRIVATE_KEY: ${{ secrets.CERTIFICATE_PRIVATE_KEY }}
      REVENUECAT_PUBLIC_KEY: ${{ secrets.REVENUECAT_PUBLIC_KEY_IOS }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Read Flutter version from .mise.toml
        id: mise
        run: echo "flutter_version=$(grep 'flutter' .mise.toml | sed 's/.*= *\"//' | sed 's/\"//')" >> "$GITHUB_OUTPUT"
      - uses: shorebirdtech/setup-shorebird@4dd9d7dc2d7930bfeadb053b6e94b5110779d1e5 # v1.0.1
        with:
          cache: true
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          flutter-version: ${{ steps.mise.outputs.flutter_version }}
          cache: true
      - name: Install Codemagic CLI Tools
        run: |
          pipx install codemagic-cli-tools
          pipx ensurepath
      - name: Setup Firebase config
        run: echo "${{ secrets.GOOGLE_SERVICE_INFO_PLIST_BASE64 }}" | base64 -d > apps/mobile/ios/Runner/GoogleService-Info.plist
      - name: Use precompiled Rust artifacts for Shorebird
        run: |
          printf '%s\n' 'use_precompiled_binaries: true' > apps/mobile/cargokit_options.yaml
      - run: flutter pub get
        working-directory: apps/mobile
      - run: dart analyze .
        working-directory: apps/mobile
      - run: flutter test
        working-directory: apps/mobile
      - name: Fetch signing files
        run: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE --create
        env:
          BUNDLE_ID: com.k9i.ccpocket
      - name: Setup keychain
        run: keychain initialize
      - name: Add certs to keychain
        run: keychain add-certificates
      - name: Set up code signing
        run: xcode-project use-profiles
      - name: Shorebird Release iOS
        working-directory: apps/mobile
        run: |
          # --no-tree-shake-icons: Prevent MaterialIcons-Regular.otf from changing
          # between release and patch builds, which causes Shorebird asset diff warnings
          # and prevents patches from being applied on devices.
          # TODO: Remove once Shorebird supports asset patching (https://github.com/shorebirdtech/shorebird/issues/318)
          shorebird release ios \
            --flutter-version="${{ steps.mise.outputs.flutter_version }}" \
            --export-options-plist=$HOME/export_options.plist \
            -- \
            --dart-define=REVENUECAT_PUBLIC_KEY="${REVENUECAT_PUBLIC_KEY}" \
            --no-tree-shake-icons
      - name: Find IPA file
        id: find_ipa
        run: |
          IPA_PATH=$(ls apps/mobile/build/ios/ipa/*.ipa)
          echo "ipa_path=$IPA_PATH" >> "$GITHUB_OUTPUT"
      - name: Verify iOS entitlements
        run: |
          EXTRACT_DIR="$RUNNER_TEMP/ccpocket-ipa"
          ENTITLEMENTS_PATH="$RUNNER_TEMP/ccpocket-entitlements.plist"
          rm -rf "$EXTRACT_DIR"
          mkdir -p "$EXTRACT_DIR"
          unzip -q "${{ steps.find_ipa.outputs.ipa_path }}" -d "$EXTRACT_DIR"
          codesign -d --entitlements :- "$EXTRACT_DIR/Payload/Runner.app" > "$ENTITLEMENTS_PATH"
          APS_ENV=$(/usr/libexec/PlistBuddy -c 'Print :aps-environment' "$ENTITLEMENTS_PATH")
          echo "aps-environment=$APS_ENV"
          if [ "$APS_ENV" != "production" ]; then
            echo "::error::Expected aps-environment=production in TestFlight IPA"
            exit 1
          fi
      - name: Upload to TestFlight
        # v5 uses the App Store Connect API backend by default. Keep processing
        # polling disabled because the upload succeeds, but the polling request
        # returns 401 with the current App Store Connect API key.
        uses: apple-actions/upload-testflight-build@1ad58030672057aa084b4e96beb6f7a8c627f9e6 # v5.2.1
        with:
          app-path: ${{ steps.find_ipa.outputs.ipa_path }}
          issuer-id: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          api-key-id: ${{ secrets.APP_STORE_CONNECT_KEY_IDENTIFIER }}
          api-private-key: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
          wait-for-processing: 'false'

      # GitHub Release (only when triggered by tag push)
      - name: Extract version from tag
        if: startsWith(github.ref, 'refs/tags/')
        id: version
        run: echo "version=${GITHUB_REF_NAME#ios/v}" >> "$GITHUB_OUTPUT"
      - name: Extract changelog section
        if: startsWith(github.ref, 'refs/tags/')
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SEMVER="${VERSION%%+*}"
          NOTES=$(awk "/^## \\[${SEMVER}\\]/{found=1; next} /^## \\[/{if(found) exit} found{print}" CHANGELOG.md)
          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_NOTES: ${{ steps.changelog.outputs.notes }}
        run: |
          printf '%s\n' "$RELEASE_NOTES" > /tmp/release_notes.md
          gh release create "$GITHUB_REF_NAME" \
            --title "iOS ${{ steps.version.outputs.version }}" \
            --notes-file /tmp/release_notes.md
