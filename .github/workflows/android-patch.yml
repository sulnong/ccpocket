name: Android Patch (Shorebird)
on:
  workflow_dispatch:
    inputs:
      release_version:
        description: 'The release version to patch (e.g. 1.0.0+8)'
        required: true
      track:
        description: 'Target track'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - stable
jobs:
  patch:
    runs-on: ubuntu-latest
    env:
      SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Read Flutter version from .mise.toml
        id: mise
        run: echo "flutter_version=$(grep 'flutter' .mise.toml | sed 's/.*= *\"//' | sed 's/\"//')" >> "$GITHUB_OUTPUT"
      - uses: shorebirdtech/setup-shorebird@4dd9d7dc2d7930bfeadb053b6e94b5110779d1e5 # v1.0.1
        with:
          cache: true
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          flutter-version: ${{ steps.mise.outputs.flutter_version }}
          cache: true
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/gradle-build-action@ac2d340dc04d9e1113182899e983b5400c17cda1 # v3.5.0
      - name: Setup Android signing
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > apps/mobile/android/keystore.jks
          cat > apps/mobile/android/keystore.properties << EOF
          storeFile=${{ github.workspace }}/apps/mobile/android/keystore.jks
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF
      - name: Setup Firebase config
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 -d > apps/mobile/android/app/google-services.json
      - name: Enable precompiled Rust artifacts for Android CI
        run: |
          printf '%s\n' 'use_precompiled_binaries: true' > apps/mobile/cargokit_options.yaml
      - run: flutter pub get
        working-directory: apps/mobile
      - run: dart analyze .
        working-directory: apps/mobile
      - run: flutter test
        working-directory: apps/mobile
      - name: Shorebird Patch Android
        working-directory: apps/mobile
        run: |
          # --no-tree-shake-icons: Keep MaterialIcons font stable across release/patch builds.
          # TODO: Remove once Shorebird supports asset patching (https://github.com/shorebirdtech/shorebird/issues/318)
          shorebird patch android \
            --release-version=${{ inputs.release_version }} \
            --track=${{ inputs.track }} \
            -- --no-tree-shake-icons
